<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunny Event</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Start -->
    <section id="home">


        
<div class="overlay"></div>

<div class="home-content">

    <h1>Sunny Event</h1>

    <button id="startBtn">Start</button>

</div>
 
    </section>


    <!-- Register -->
    <section id="register" class="hidden">

        <div class="container">

            <h2>  RegisterForm </h2>

            <form id="registerForm">

                <input
                    type="text"
                    id="name"
                    placeholder="name"
                    required>

                <input
                    type="email"
                    id="email"
                    placeholder="email"
                    required>

                <input
                    type="tel"
                    id="phone"
                    placeholder="phone  "
                    required>

                <button type="submit">
                    Start 
                </button>

            </form>

        </div>

    </section>


    <!-- Referral -->
    <section id="referral" class="hidden">

        <div class="container">

            <h2> Nominated a friend to complete the competition.  </h2>

            <form id="referralForm">

                <input
                    type="text"
                    id="friendName"
                    placeholder=" friendName  "
                    required>

                <input
                    type="tel"
                    id="friendPhone"
                    placeholder="  friendPhone   "
                    required>

                <button type="submit">
                     submit
                </button>

            </form>

        </div>

    </section>


    <!-- Quiz -->

    <section id="quiz" class="hidden">

        <h3 id="progress"></h3>

        <h2 id="question"></h2>

        <div id="answers"></div>

    </section>


    <!-- Result -->
<section id="result" class="hidden">

    <div id="resultText"></div>

</section>
<div id="popupContainer"></div>
<script src="js/data.js"></script>
<script type="module" src="js/app.js"></script>

</body>

</html>
