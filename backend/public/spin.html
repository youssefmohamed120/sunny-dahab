<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sunny Dahab | Spin & Win</title>

<link rel="stylesheet" href="./css/spin.css">

</head>

<body>

<div class="page">

   

    <h1>🎉 Spin & Win 🎉</h1>

    <p class="subtitle">
        Enter your phone number then spin the wheel.
    </p>

    <input
        id="phone"
        type="tel"
        placeholder="Phone Number">

    <div class="wheel-box">

        <div class="pointer"></div>

        <canvas
            id="wheel"
            width="500"
            height="500">
        </canvas>

    </div>

    <button id="spinBtn">
        SPIN NOW
    </button>

</div>

<script src="../public/js/spin.js"></script>

</body>
</html>
